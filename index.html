<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes, viewport-fit=cover">
    <title>♥ Вопросы ♥</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
        }
        body {
            min-height: 100vh;
            background: linear-gradient(145deg, #fce4ec 0%, #f8bbd0 100%);
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 16px;
            margin: 0;
            touch-action: manipulation;
        }
        .card {
            background: rgba(255, 250, 250, 0.7);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 48px 48px 32px 32px;
            box-shadow: 0 25px 45px -12px rgba(180, 60, 80, 0.4),
            inset 0 1px 3px rgba(255, 255, 255, 0.7);
            width: 100%;
            max-width: 420px;
            padding: 28px 22px 32px;
            transition: all 0.2s ease;
            border: 1px solid rgba(255, 220, 230, 0.5);
            display: flex;
            flex-direction: column;
            min-height: 500px;
        }

        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 8px;
            border-bottom: 2px dashed rgba(200, 100, 120, 0.25);
        }
        .header h2 {
            font-size: 1.3rem;
            font-weight: 600;
            color: #7a3e4b;
            letter-spacing: -0.3px;
            text-shadow: 0 1px 2px rgba(255, 200, 210, 0.6);
        }
        .progress-badge {
            background: #b94a5f;
            color: white;
            padding: 6px 14px;
            border-radius: 40px;
            font-size: 0.8rem;
            font-weight: 500;
            box-shadow: 0 4px 8px rgba(180, 60, 80, 0.2);
            letter-spacing: 0.3px;
        }

        .question-container {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 240px;
            margin: 12px 0 18px;
        }

        .question-text {
            font-size: 1.5rem;
            line-height: 1.4;
            font-weight: 500;
            color: #2d1b20;
            text-align: center;
            padding: 8px 4px;
            background: rgba(255, 240, 245, 0.3);
            border-radius: 40px;
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            box-shadow: inset 0 2px 8px rgba(200, 100, 120, 0.08);
            transition: opacity 0.25s ease;
            word-break: break-word;
        }

        .placeholder-end {
            font-size: 1.8rem;
            font-weight: 600;
            color: #8a4d5c;
            text-align: center;
            padding: 30px 10px;
            background: rgba(255, 220, 230, 0.4);
            border-radius: 60px;
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 200, 210, 0.5);
        }
        .placeholder-end span {
            display: block;
            font-size: 2.8rem;
            margin-bottom: 10px;
        }

        .btn {
            background: #c75b72;
            border: none;
            border-radius: 60px;
            padding: 18px 20px;
            font-size: 1.2rem;
            font-weight: 600;
            color: white;
            width: 100%;
            box-shadow: 0 10px 20px -8px rgba(160, 60, 80, 0.4);
            transition: all 0.2s cubic-bezier(0.2, 0.9, 0.4, 1);
            letter-spacing: 0.6px;
            backdrop-filter: blur(4px);
            background: linear-gradient(135deg, #d46b82, #b84a62);
            border: 1px solid rgba(255, 220, 230, 0.3);
            touch-action: manipulation;
            cursor: pointer;
            margin-top: 8px;
        }
        .btn:active {
            transform: scale(0.96);
            box-shadow: 0 6px 12px -6px #a0445a;
        }
        .btn:disabled {
            opacity: 0.5;
            transform: scale(0.98);
            box-shadow: 0 4px 10px -6px #a0445a;
            background: #b0a0a5;
            pointer-events: none;
        }
        .btn-restart {
            background: #a06673;
            background: linear-gradient(135deg, #b07a87, #8f5e6b);
            margin-top: 12px;
            font-size: 1rem;
            padding: 14px 20px;
            box-shadow: 0 6px 14px -6px #6a3f49;
        }
        .btn-restart:active {
            transform: scale(0.96);
        }

        .footer-note {
            text-align: center;
            font-size: 0.7rem;
            color: #946a74;
            margin-top: 18px;
            opacity: 0.8;
            letter-spacing: 0.4px;
        }

        /* маленькие анимации */
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }
        @keyframes fadeIn {
            0% { opacity: 0.4; transform: translateY(8px); }
            100% { opacity: 1; transform: translateY(0); }
        }

        /* скролл для длинных вопросов */
        .question-text {
            max-height: 400px;
            overflow-y: auto;
            scrollbar-width: thin;
            scrollbar-color: #d48a9a #fce4ec;
        }
        .question-text::-webkit-scrollbar {
            width: 4px;
        }
        .question-text::-webkit-scrollbar-track {
            background: #fce4ec;
            border-radius: 20px;
        }
        .question-text::-webkit-scrollbar-thumb {
            background: #d48a9a;
            border-radius: 20px;
        }

        /* для мобильной приятности */
        @media (max-width: 480px) {
            .card { padding: 20px 16px 24px; }
            .question-text { font-size: 1.3rem; }
        }
    </style>
</head>
<body>
<div class="card" role="main">
    <div class="header">
        <h2>✨</h2>
        <div class="progress-badge" id="progressDisplay">0 / 20</div>
    </div>

    <div class="question-container" id="questionContainer">
        <div class="question-text fade-in" id="questionText">
            Нажми «Следующий вопрос» и начнем 💕
        </div>
    </div>

    <button class="btn" id="nextBtn">💫 Следующий вопрос</button>
    <button class="btn btn-restart" id="restartBtn">⟳ Начать заново</button>
</div>

<script>
    (function() {
        // -------- СПИСОК ВОПРОСОВ (20) --------
        const QUESTIONS = [
            "Если бы ты могла взять с собой на необитаемый остров только 3 вещи (не считая еды и воды), что бы это было?",
            "Какая самая странная еда, которую ты пробовала, и она тебе понравилась?",
            "Если бы у тебя был супергеройский псевдоним, основанный на твоей привычке, как бы тебя звали?",
            "Что тебя бесит молниеносно, а остальные считают это ерундой? (Например, звук жующих людей или криво висящая картина).",
            "Твоя самая смешная детская травма или падение, о котором ты вспоминаешь со смехом?",
            "Каким животным ты была бы в прошлой жизни и почему?",
            "Что из мультфильмов/сериалов детства ты пересматриваешь до сих пор, когда болеешь или грустишь?",
            "Какая у тебя «закидонная» утренняя привычка, без которой день не задался? (Не встану без телефона / Сначала носки, потом трусы и т.д.).",
            "Какой фильм или книга заставили тебя плакать, хотя ты этого не ожидала?",
            "Какая песня у тебя сейчас стоит на репите, но ты стесняешься сказать об этом друзьям?",
            "Если бы ты могла научиться чему угодно за один день, не прилагая усилий, что бы ты выбрала?",
            "Самая бесполезная покупка в твоей жизни, которая сейчас пылится на полке?",
            "Что для тебя самое главное в людях, когда ты только начинаешь общение — внешность, голос, чувство юмора или запах?",
            "Какое место в городе вызывает у тебя самые тёплые воспоминания?",
            "Какую фразу тебе редко говорят, но тебе очень хочется её слышать?",
            "Если бы ты могла дать совет своему 16-летнему \"я\", что бы ты сказала?",
            "Какая твоя «тихая гордость», о которой ты редко рассказываешь, но знаешь, что ты в этом крута?",
            "Как ты обычно принимаешь сложные решения — сердцем или головой?",
            "Если бы деньги не имели значения, какую странную работу ты бы выбрала на месяц?",
            "Какая страна вызывает у тебя иррациональный страх и одновременно дикое желание туда поехать?",
            "Какое кино ты хотела бы стереть себе из памяти, чтобы пересмотреть его заново?",
            "Ты бы хотела прославиться, и если да, то за какое занятие?",
            "Какая идея для идеального воскресного дня у тебя в голове?",
            "Если бы ты встретила инопланетянина, что бы ты показала ему на Земле в первую очередь?"
        ];

        // -------- КЛЮЧИ ДЛЯ LOCALSTORAGE --------
        const STORAGE_KEY = 'romantic_questions_asked';  // строка с индексами через запятую
        const TOTAL_QUESTIONS = QUESTIONS.length;

        // -------- DOM ЭЛЕМЕНТЫ --------
        const questionTextEl = document.getElementById('questionText');
        const nextBtn = document.getElementById('nextBtn');
        const restartBtn = document.getElementById('restartBtn');
        const progressDisplay = document.getElementById('progressDisplay');

        // -------- СОСТОЯНИЕ --------
        let askedIndices = [];        // массив чисел (индексы уже показанных вопросов)
        let currentQuestionIndex = null; // индекс текущего вопроса (или null, если все заданы)

        // -------- ФУНКЦИИ РАБОТЫ С LOCALSTORAGE --------
        function loadAskedFromStorage() {
            const stored = localStorage.getItem(STORAGE_KEY);
            if (stored) {
                try {
                    const parsed = JSON.parse(stored);
                    if (Array.isArray(parsed)) {
                        // фильтруем только валидные индексы (на случай изменений)
                        askedIndices = parsed.filter(idx => Number.isInteger(idx) && idx >= 0 && idx < TOTAL_QUESTIONS);
                        return;
                    }
                } catch (e) {}
            }
            askedIndices = [];
        }

        function saveAskedToStorage() {
            localStorage.setItem(STORAGE_KEY, JSON.stringify(askedIndices));
        }

        // -------- ОСНОВНАЯ ЛОГИКА --------
        function getRandomUnaskedIndex() {
            const allIndices = Array.from({ length: TOTAL_QUESTIONS }, (_, i) => i);
            const unasked = allIndices.filter(i => !askedIndices.includes(i));
            if (unasked.length === 0) return null; // все вопросы заданы
            const randomIdx = Math.floor(Math.random() * unasked.length);
            return unasked[randomIdx];
        }

        // обновить отображение вопроса и прогресса
        function renderQuestion() {
            // проверяем, все ли вопросы заданы
            if (askedIndices.length >= TOTAL_QUESTIONS) {
                // все вопросы показаны
                questionTextEl.innerHTML = `
            <div class="placeholder-end">
              <span>💞</span>
              Вопросы закончились
            </div>
          `;
                questionTextEl.classList.remove('fade-in');
                void questionTextEl.offsetWidth; // триггер перерисовки
                questionTextEl.classList.add('fade-in');
                nextBtn.disabled = true;
                progressDisplay.textContent = `${TOTAL_QUESTIONS} / ${TOTAL_QUESTIONS}`;
                currentQuestionIndex = null;
                return;
            }

            // если есть не заданные вопросы — берём случайный
            const nextIndex = getRandomUnaskedIndex();
            if (nextIndex === null) {
                // на всякий случай, если что-то пошло не так
                questionTextEl.textContent = '💖 Ты ответила на все вопросы! (перезагрузи)';
                nextBtn.disabled = true;
                progressDisplay.textContent = `${TOTAL_QUESTIONS} / ${TOTAL_QUESTIONS}`;
                currentQuestionIndex = null;
                return;
            }

            // сохраняем индекс как текущий
            currentQuestionIndex = nextIndex;
            // добавляем в список заданных и сохраняем
            askedIndices.push(nextIndex);
            saveAskedToStorage();

            // отображаем вопрос
            questionTextEl.textContent = QUESTIONS[nextIndex];
            // анимация
            questionTextEl.classList.remove('fade-in');
            void questionTextEl.offsetWidth;
            questionTextEl.classList.add('fade-in');

            // обновляем прогресс
            progressDisplay.textContent = `${askedIndices.length} / ${TOTAL_QUESTIONS}`;
            nextBtn.disabled = false;
        }

        // -------- ОБРАБОТЧИКИ --------
        function handleNextQuestion() {
            // если все вопросы уже заданы — ничего не делаем (или можно просто перерендерить)
            if (askedIndices.length >= TOTAL_QUESTIONS) {
                renderQuestion(); // покажет финальный экран
                return;
            }
            renderQuestion();
        }

        function handleRestart() {
            // сбрасываем всё: очищаем массив и localStorage
            askedIndices = [];
            localStorage.removeItem(STORAGE_KEY);
            currentQuestionIndex = null;
            // рендерим первый случайный вопрос
            renderQuestion();
            // если вдруг все вопросы (0) — но у нас их 20, так что ок
            nextBtn.disabled = false;
        }

        // -------- ИНИЦИАЛИЗАЦИЯ --------
        function init() {
            // загружаем сохранённые индексы
            loadAskedFromStorage();

            // если в сторадже есть индексы, но они уже все — показываем завершение
            if (askedIndices.length >= TOTAL_QUESTIONS) {
                // все вопросы были отвечены, показываем финал
                questionTextEl.innerHTML = `
            <div class="placeholder-end">
              <span>💞</span>
              Ты ответила на все вопросы!<br>
              <span style="font-size: 1.2rem; margin-top: 10px; display: inline-block;">Ты — моя бесконечность ✨</span>
            </div>
          `;
                questionTextEl.classList.add('fade-in');
                nextBtn.disabled = true;
                progressDisplay.textContent = `${TOTAL_QUESTIONS} / ${TOTAL_QUESTIONS}`;
                currentQuestionIndex = null;
            } else {
                // если есть неотвеченные — показываем первый случайный
                // но сначала проверим, есть ли вообще неотвеченные (на случай если массив повреждён)
                const unasked = Array.from({ length: TOTAL_QUESTIONS }, (_, i) => i).filter(i => !askedIndices.includes(i));
                if (unasked.length === 0) {
                    // странно, но если все заданы (при несовпадении длины) — показываем финал
                    questionTextEl.innerHTML = `
              <div class="placeholder-end">
                <span>💞</span>
                Ты ответила на все вопросы!<br>
                <span style="font-size: 1.2rem; margin-top: 10px; display: inline-block;">Ты — моя бесконечность ✨</span>
              </div>
            `;
                    nextBtn.disabled = true;
                    progressDisplay.textContent = `${TOTAL_QUESTIONS} / ${TOTAL_QUESTIONS}`;
                    currentQuestionIndex = null;
                } else {
                    // рендерим первый вопрос
                    renderQuestion();
                }
            }

            // навешиваем слушатели
            nextBtn.addEventListener('click', handleNextQuestion);
            restartBtn.addEventListener('click', handleRestart);
        }

        // Запуск
        init();

    })();
</script>
</body>
</html>
