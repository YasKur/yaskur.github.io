<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>Романтический таймер</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: linear-gradient(145deg, #ffdde1 0%, #fad0d4 100%);
            font-family: 'Segoe UI', 'Roboto', system-ui, -apple-system, sans-serif;
            padding: 16px;
            margin: 0;
        }

        .timer-card {
            background: rgba(255, 245, 247, 0.65);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 56px 56px 48px 48px;
            padding: 32px 24px 40px;
            max-width: 440px;
            width: 100%;
            box-shadow:
                    0 25px 45px -10px rgba(200, 100, 120, 0.3),
                    inset 0 0 0 1px rgba(255, 255, 255, 0.5);
            transition: all 0.2s ease;
            text-align: center;
            border: 1px solid rgba(255, 220, 230, 0.5);
        }

        .romantic-icon {
            font-size: 2.6rem;
            line-height: 1;
            margin-bottom: 8px;
            display: inline-block;
            filter: drop-shadow(0 6px 10px rgba(200, 70, 90, 0.2));
            letter-spacing: 4px;
        }

        .title {
            font-size: 1.8rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: #6b3f4a;
            margin-bottom: 12px;
            text-shadow: 0 2px 8px rgba(255, 200, 210, 0.6);
            font-family: 'Georgia', 'Times New Roman', serif;
        }

        .subtitle {
            font-size: 0.95rem;
            font-weight: 300;
            color: #8a5a67;
            background: rgba(255, 220, 225, 0.3);
            display: inline-block;
            padding: 6px 24px;
            border-radius: 40px;
            backdrop-filter: blur(4px);
            margin-bottom: 28px;
            border: 0.5px solid rgba(255, 200, 210, 0.4);
            letter-spacing: 0.5px;
        }

        .countdown-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
            margin: 16px 0 22px;
        }

        .time-block {
            background: rgba(255, 240, 242, 0.5);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            border-radius: 32px;
            padding: 14px 0 12px;
            box-shadow: inset 0 2px 10px rgba(255, 255, 255, 0.7), 0 6px 14px rgba(190, 100, 120, 0.12);
            border: 0.5px solid rgba(255, 255, 255, 0.6);
            transition: 0.2s;
        }

        .time-number {
            font-size: 2.8rem;
            font-weight: 400;
            color: #442a32;
            letter-spacing: 1px;
            line-height: 1.1;
            font-family: 'Georgia', 'Times New Roman', serif;
            text-shadow: 0 2px 8px rgba(255, 180, 190, 0.3);
        }

        .time-label {
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: #936a78;
            font-weight: 400;
            margin-top: 4px;
            opacity: 0.9;
            background: rgba(255, 220, 225, 0.2);
            padding: 2px 10px;
            border-radius: 30px;
            display: inline-block;
            backdrop-filter: blur(2px);
        }

        .heartbeat {
            margin-top: 18px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            font-size: 1rem;
            color: #7e4d5b;
            letter-spacing: 0.4px;
        }

        .heartbeat span {
            display: inline-block;
            animation: pulse 1.8s infinite ease-in-out;
        }

        @keyframes pulse {
            0% { transform: scale(1); opacity: 0.7; }
            50% { transform: scale(1.3); opacity: 1; }
            100% { transform: scale(1); opacity: 0.7; }
        }

        .message {
            font-size: 0.9rem;
            font-weight: 300;
            color: #8a5a67;
            margin-top: 10px;
            padding: 6px 14px;
            background: rgba(255, 240, 242, 0.3);
            border-radius: 50px;
            display: inline-block;
            backdrop-filter: blur(4px);
            border: 0.3px solid rgba(255, 200, 210, 0.3);
            font-style: italic;
        }

        .target-date {
            font-size: 0.75rem;
            color: #a47482;
            margin-top: 12px;
            opacity: 0.8;
            letter-spacing: 0.8px;
            background: rgba(255, 220, 230, 0.2);
            padding: 4px 12px;
            border-radius: 40px;
            display: inline-block;
            backdrop-filter: blur(2px);
        }

        /* Mobile first — дополнительная адаптация */
        @media (max-width: 380px) {
            .timer-card {
                padding: 24px 12px 28px;
                border-radius: 44px;
            }
            .time-number {
                font-size: 2.2rem;
            }
            .title {
                font-size: 1.5rem;
            }
            .countdown-grid {
                gap: 6px;
            }
            .time-block {
                padding: 10px 0 8px;
            }
        }

        @media (min-width: 600px) {
            .timer-card {
                padding: 48px 36px 48px;
                border-radius: 80px 80px 64px 64px;
            }
            .time-number {
                font-size: 4rem;
            }
            .title {
                font-size: 2.6rem;
            }
            .countdown-grid {
                gap: 16px;
            }
            .time-block {
                padding: 20px 0 16px;
            }
        }

        /* лёгкая тень и свечение */
        .timer-card:hover {
            box-shadow: 0 30px 55px -12px rgba(180, 80, 100, 0.3);
        }
    </style>
</head>
<body>
<div class="timer-card" role="main" aria-label="Романтический таймер до 17 июля 2026 года">
    <div class="romantic-icon">💕</div>
    <div class="countdown-grid" id="countdownGrid">
        <div class="time-block">
            <div class="time-number" id="days">00</div>
            <div class="time-label">дней</div>
        </div>
        <div class="time-block">
            <div class="time-number" id="hours">00</div>
            <div class="time-label">часов</div>
        </div>
        <div class="time-block">
            <div class="time-number" id="minutes">00</div>
            <div class="time-label">минут</div>
        </div>
        <div class="time-block">
            <div class="time-number" id="seconds">00</div>
            <div class="time-label">секунд</div>
        </div>
    </div>
</div>

<script>
    (function() {
        // Целевая дата: 17 июля 2026 17:00
        const TARGET_DATE = new Date(2026, 6, 17, 17, 0, 0).getTime(); // month 6 = July

        // Элементы
        const daysEl = document.getElementById('days');
        const hoursEl = document.getElementById('hours');
        const minutesEl = document.getElementById('minutes');
        const secondsEl = document.getElementById('seconds');

        // Форматирование с ведущим нулём
        function formatTime(value) {
            return String(value).padStart(2, '0');
        }

        // Обновление таймера
        function updateTimer() {
            const now = Date.now();
            let diff = TARGET_DATE - now;

            // Если таймер достиг цели или пересёк её
            if (diff <= 0) {
                daysEl.textContent = '00';
                hoursEl.textContent = '00';
                minutesEl.textContent = '00';
                secondsEl.textContent = '00';
                return;
            }

            // Вычисление дней, часов, минут, секунд
            const days = Math.floor(diff / (1000 * 60 * 60 * 24));
            diff -= days * (1000 * 60 * 60 * 24);
            const hours = Math.floor(diff / (1000 * 60 * 60));
            diff -= hours * (1000 * 60 * 60);
            const minutes = Math.floor(diff / (1000 * 60));
            diff -= minutes * (1000 * 60);
            const seconds = Math.floor(diff / 1000);

            // Обновление DOM
            daysEl.textContent = formatTime(days);
            hoursEl.textContent = formatTime(hours);
            minutesEl.textContent = formatTime(minutes);
            secondsEl.textContent = formatTime(seconds);
        }

        // Запускаем обновление сразу, чтобы не ждать первую секунду
        updateTimer();

        // Обновляем каждую секунду
        const interval = setInterval(updateTimer, 1000);

        // Очистка интервала при выгрузке страницы (хорошая практика)
        window.addEventListener('beforeunload', function() {
            clearInterval(interval);
        });

        // дополнительно: если вкладка была неактивна, при возврате обновим
        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) {
                updateTimer();
            }
        });
    })();
</script>
</body>
</html>
