<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=yes">
    <title>💫</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pacifico&display=swap" rel="stylesheet">
    <style>
        /* ——— Сброс и база ——— */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Pacifico', sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 0;
            padding: 16px;
            position: relative;
            overflow-x: hidden;
            background-size: cover;
            background-repeat: no-repeat;
            background-position: 50%;
            background-image: url(./space.jpg);
        }

        /* ——— Звёздное небо ——— */
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                    radial-gradient(2px 2px at 10% 20%, rgba(255, 255, 255, 0.6), transparent),
                    radial-gradient(2px 2px at 30% 70%, rgba(255, 255, 255, 0.5), transparent),
                    radial-gradient(3px 3px at 55% 15%, rgba(255, 255, 255, 0.7), transparent),
                    radial-gradient(2px 2px at 70% 85%, rgba(255, 255, 255, 0.4), transparent),
                    radial-gradient(2px 2px at 85% 40%, rgba(255, 255, 255, 0.6), transparent),
                    radial-gradient(2px 2px at 15% 90%, rgba(255, 255, 255, 0.3), transparent),
                    radial-gradient(3px 3px at 45% 45%, rgba(255, 255, 255, 0.5), transparent),
                    radial-gradient(2px 2px at 92% 10%, rgba(255, 255, 255, 0.4), transparent),
                    radial-gradient(2px 2px at 5% 50%, rgba(255, 255, 255, 0.5), transparent),
                    radial-gradient(2px 2px at 60% 95%, rgba(255, 255, 255, 0.3), transparent);
            background-size: 200px 200px;
            background-repeat: repeat;
            opacity: 0.8;
            pointer-events: none;
            z-index: 0;
        }

        /* ——— Падающие звёзды ——— */
        .shooting-star {
            position: fixed;
            width: 2px;
            height: 2px;
            background: white;
            border-radius: 50%;
            box-shadow: 0 0 6px 2px rgba(255, 200, 255, 0.6);
            animation: shoot linear infinite;
            opacity: 0;
            z-index: 0;
            pointer-events: none;
        }
        .shooting-star:nth-child(1) { top: 10%; left: 20%; animation-duration: 7s; animation-delay: 1s; }
        .shooting-star:nth-child(2) { top: 30%; left: 70%; animation-duration: 9s; animation-delay: 4s; }
        .shooting-star:nth-child(3) { top: 60%; left: 10%; animation-duration: 8s; animation-delay: 7s; }
        .shooting-star:nth-child(4) { top: 80%; left: 50%; animation-duration: 11s; animation-delay: 2s; }

        @keyframes shoot {
            0% { transform: translate(0, 0) scale(0.5); opacity: 0; }
            5% { opacity: 1; }
            20% { transform: translate(120px, 80px) scale(1.2); opacity: 0.8; }
            40% { transform: translate(250px, 180px) scale(0.8); opacity: 0.4; }
            60% { transform: translate(380px, 280px) scale(0.3); opacity: 0.1; }
            100% { transform: translate(500px, 400px) scale(0); opacity: 0; }
        }

        /* ——— Контейнер (стекло) ——— */
        .container {
            position: relative;
            z-index: 2;
            backdrop-filter: blur(3px) saturate(1.2);
            -webkit-backdrop-filter: blur(2px) saturate(1.2);
            background: rgba(20, 10, 40, 0.45);
            border-radius: 48px;
            padding: 40px 32px 36px;
            max-width: 460px;
            width: 100%;
            box-shadow:
                    0 30px 80px rgba(0, 0, 0, 0.8),
                    0 0 0 1px rgba(255, 200, 255, 0.08),
                    inset 0 1px 0 rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 200, 255, 0.06);
            transition: all 0.4s ease;
        }

        /* ——— Декоративные уголки (лунные) ——— */
        .corner-moon {
            position: absolute;
            font-size: 18px;
            opacity: 0.2;
            color: #f0e6ff;
            filter: drop-shadow(0 0 6px #b39ddb);
            user-select: none;
            pointer-events: none;
        }
        .corner-moon:nth-child(1) { top: 18px; left: 22px; }
        .corner-moon:nth-child(2) { top: 18px; right: 22px; }
        .corner-moon:nth-child(3) { bottom: 18px; left: 22px; }
        .corner-moon:nth-child(4) { bottom: 18px; right: 22px; }

        /* ——— Основной экран ——— */
        .content-screen {
            display: flex;
            flex-direction: column;
            gap: 18px;
            text-align: center;
            padding: 6px 0 2px;
            animation: fadeUp 0.7s ease forwards;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(20px) scale(0.96); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .emoji-big {
            font-size: 4.2rem;
            display: block;
            margin-bottom: 2px;
            filter: drop-shadow(0 0 30px rgba(180, 130, 255, 0.3));
            animation: gentleFloat 4s ease-in-out infinite;
        }
        @keyframes gentleFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        .content-title {
            font-size: 2rem;
            font-weight: 700;
            color: #f0eaff;
            text-shadow: 0 0 20px rgba(180, 130, 255, 0.2);
            letter-spacing: 1px;
        }

        .message-text {
            font-size: 1.05rem;
            color: #d4c8e8;
            line-height: 1.8;
            max-width: 340px;
            margin: 0 auto;
            text-align: left;
            padding: 0 6px;
            font-weight: 400;
        }
        .message-text p {
            margin-bottom: 12px;
        }
        .message-text .highlight {
            color: #d9b3ff;
            font-weight: 600;
            background: rgba(180, 130, 255, 0.08);
            padding: 2px 14px;
            border-radius: 30px;
            display: inline-block;
            border: 1px solid rgba(180, 130, 255, 0.1);
        }
        .message-text .romantic-line {
            border-left: 3px solid #b380ff;
            padding-left: 16px;
            color: #e0d0f0;
            font-style: italic;
            margin-top: 6px;
        }
        .message-text ul {
            list-style: none;
            padding: 0;
            margin-top: 10px;
        }
        .message-text ul li {
            /*padding: 6px 0 6px 28px;*/
            padding-bottom: 5px;
            /*background: url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="%23b380ff" stroke-width="2"><path d="M12 2L15.09 8.26L22 9.27L17 14.14L18.18 21.02L12 17.77L5.82 21.02L7 14.14L2 9.27L8.91 8.26L12 2z"/></svg>') left center no-repeat;*/
            /*background-size: 18px;*/
            margin-bottom: 4px;
            color: #e91e63;
        }
        h3 {
            margin-bottom: 20px;
        }
        /* ——— Адаптив ——— */
        @media (max-width: 420px) {
            .container { padding: 32px 20px 28px; }
            .content-title { font-size: 1.6rem; }
            .message-text { font-size: 0.95rem; }
            .emoji-big { font-size: 3.4rem; }
        }
    </style>
</head>
<body>

<!-- Падающие звёзды -->
<span class="shooting-star"></span>
<span class="shooting-star"></span>
<span class="shooting-star"></span>
<span class="shooting-star"></span>

<div class="container" id="appContainer">
    <!-- Декоративные луны (просто украшение) -->
    <span class="corner-moon">☾</span>
    <span class="corner-moon">☽</span>
    <span class="corner-moon">☾</span>
    <span class="corner-moon">☽</span>

    <!-- ====== Единственный экран ====== -->
    <div id="mainScreen" class="content-screen">
        <div class="content-title">Приглашение</div>
        <div class="message-text">
            <p style="text-align: center">Софья Эдуардовна, сегодня после игры, жду вас в гости.</p>
<!--            <h3 style="text-align: center">Программа вечера</h3>-->
            <ul style="text-align: center">
                <li>🍔 Готовим и кушаем бургеры</li>
                <li>💬 Расскажите как прошел ваш день?</li>
                <li>💆‍♀️ Массаж по расписанию</li>
                <li>🪟 Выбор штор</li>
                <li>🎫 Посмотрим билеты</li>
                <li>🧱 Может быть начнем собирать Lego</li>
            </ul>
        </div>
    </div>
</div>

</body>
</html>
